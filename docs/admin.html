<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Routes - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { padding: 2rem; max-width: 900px; margin: 0 auto; }
        .order-card { margin-bottom: 1.5rem; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8e8e8; padding-bottom: 10px; margin-bottom: 10px; }
        .order-header h3 { font-size: 1.1rem; color: #1a1a1a; }
        .items-list { list-style-position: inside; color: #555; margin-top: 0.5rem; }
        .items-list li { padding: 3px 0; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-preparing { background: #e3f2fd; color: #1565c0; }
        .status-ready { background: #e8f5e9; color: #2e7d32; }
        .order-meta { color: #888; font-size: 0.88rem; margin: 4px 0; }
        .order-total { text-align: right; color: #ff6b35; font-size: 1.1rem; font-weight: 700; margin-top: 10px; }
        .no-orders { text-align: center; padding: 4rem 0; color: #aaa; }
        .admin-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .admin-header-bar h2 { font-size: 1.4rem; color: #1a1a1a; }
        .lock-btn { background: #f0f0f0; border: 1px solid #e8e8e8; color: #555; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
        .lock-btn:hover { background: #e4e4e4; color: #333; }
    </style>
</head>
<body>

    <!-- 1. Password Screen -->
    <div id="admin-login-screen" class="flex-center active">
        <div class="entry-card">
            <h1 class="brand-title">🔒 Admin</h1>
            <p class="subtitle">Restaurant Dashboard Access</p>

            <form id="admin-form" style="margin-top: 1.5rem;">
                <div class="input-group">
                    <label for="adminPassword">Master Password</label>
                    <input type="password" id="adminPassword" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn primary-btn btn-glow">Unlock Dashboard</button>
            </form>
        </div>
    </div>

    <!-- 2. Dashboard Screen -->
    <div id="admin-dashboard" class="hidden">
        <header class="glass-header">
            <div class="header-content" style="margin-bottom: 0;">
                <h2>🍛 Spice Routes — Orders</h2>
                <button class="lock-btn" onclick="location.reload()">🔒 Lock</button>
            </div>
        </header>

        <main class="admin-container" id="orders-container">
            <p class="no-orders">Loading orders...</p>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
